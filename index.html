<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kholoud Vibes | معايا هتتعلم الإنجلش من غير ما تحس 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:#FFF9E6;color:#333;overflow-x:hidden}
        .welcome{position:fixed;top:0;left:0;width:100%;height:100vh;background:url('attachment://0') center/cover;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:0.8s}
        .welcome.hide{transform:translateY(-100%)}
        .welcome h1{background:rgba(255,255,255,0.9);padding:20px;border-radius:20px;font-size:28px;font-weight:900;color:#00B8D4;margin-bottom:30px}
        .welcome button{background:#FFD400;color:#333;border:none;padding:15px 40px;font-size:22px;font-weight:700;border-radius:50px;cursor:pointer;box-shadow:0 5px 15px rgba(0,0,0,0.3)}
        .welcome button:hover{transform:scale(1.05)}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .header{text-align:center;padding:40px 0 20px}
        .header img{max-width:350px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
        .videos{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin:40px 0}
        .video-card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1);cursor:pointer;transition:0.3s}
        .video-card:hover{transform:translateY(-5px)}
        .video-thumb{position:relative;width:100%;padding-top:56.25%;background:#ddd}
        .video-thumb iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
        .contact{text-align:center;margin:50px 0}
        .contact a{background:#00B8D4;color:white;padding:15px 30px;border-radius:50px;text-decoration:none;font-weight:700;font-size:18px;display:inline-block}
        .footer{text-align:center;padding:30px 10px;font-size:11px;color:#aaa}
        .popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:999;display:none;justify-content:center;align-items:center}
        .popup.active{display:flex}
        .popup-content{width:90%;max-width:800px;position:relative}
        .popup-content iframe{width:100%;height:450px;border:0;border-radius:10px}
        .close{position:absolute;top:-40px;right:0;color:white;font-size:35px;cursor:pointer}
    </style>
</head>
<body>
    <!-- شاشة الدخول -->
    <div class="welcome" id="welcome">
        <h1>دوس وتابع كورسات الميس خلود 💛</h1>
        <button onclick="enterSite()">يلا بينا 🔥</button>
    </div>

    <!-- الموقع -->
    <div class="container">
        <div class="header">
            <img src="attachment://1" alt="Kholoud Vibes">
        </div>

        <div class="videos" id="videos"></div>

        <div class="contact">
            <a href="https://www.facebook.com/share/18hoxaWSV4/" target="_blank" onclick="playMeow()">تواصل مع الميس خلود 💛</a>
        </div>
    </div>

    <div class="footer">
        مطور الموقع: بودا المصري | 01122989039
    </div>

    <!-- Popup الفيديو -->
    <div class="popup" id="popup" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closePopup()">&times;</span>
            <iframe id="popupFrame" allowfullscreen></iframe>
        </div>
    </div>

    <audio id="meow" src="meow.mp3"></audio>

    <script>
        const videos = [
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1LUVeJS65S/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1DWWnbaVXX/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/18YDNPT5TD/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1DFZf9Uzsu/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1CbngVHKwq/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1BWc5cLTwS/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1bDMHQ7AHG/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1CqP7HMvxK/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1EDWmxVbtG/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/18uKbDPPk7/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1B9hrN55Kx/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/19rmNprtgf/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1Gx9R8vACQ/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1HAMZxCetx/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/18TJKV7zuQ/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/1B3hhDs1Q2/",
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/share/r/18aZ8c2za9/"
        ];

        // رسم الفيديوهات
        const videosDiv = document.getElementById('videos');
        videos.forEach(link => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `<div class="video-thumb"><iframe src="${link}" allowfullscreen></iframe></div>`;
            card.onclick = () => { playMeow(); openPopup(link); };
            videosDiv.appendChild(card);
        });

        function playMeow(){
            document.getElementById('meow').currentTime = 0;
            document.getElementById('meow').play();
        }

        function enterSite(){
            playMeow();
            document.getElementById('welcome').classList.add('hide');
        }

        function openPopup(link){
            document.getElementById('popupFrame').src = link + '&autoplay=1';
            document.getElementById('popup').classList.add('active');
        }

        function closePopup(){
            document.getElementById('popupFrame').src = '';
            document.getElementById('popup').classList.remove('active');
        }

        // كل دوسة في الموقع تعمل مياو
        document.addEventListener('click', () => playMeow());
    </script>
</body>
</html>
