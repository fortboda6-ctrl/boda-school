<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kholoud Vibes | مملكة الإنجلش مع الميس خلود 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{
            background: linear-gradient(135deg, #FFF9E6 0%, #FFE69C 100%);
            color:#333;overflow-x:hidden;position:relative
        }
        body:before{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background-image: radial-gradient(#FFD400 1px, transparent 1px);
            background-size: 30px 30px;opacity:0.2;animation: stars 20s linear infinite;z-index:0
        }
        @keyframes stars{0%{background-position:0 0}100%{background-position:0 1000px}}
        
        .welcome{position:fixed;top:0;left:0;width:100%;height:100vh;background:linear-gradient(135deg, #00B8D4 0%, #FFD400 100%);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:1s}
        .welcome.hide{transform:translateY(-100%)}
        .welcome h1{background:rgba(255,255,255,0.95);padding:25px 40px;border-radius:25px;font-size:32px;font-weight:900;color:#00B8D4;margin-bottom:30px;box-shadow:0 10px 40px rgba(0,0,0,0.3);animation: pulse 2s infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .welcome button{background:#333;color:#FFD400;border:3px solid #FFD400;padding:18px 50px;font-size:24px;font-weight:900;border-radius:50px;cursor:pointer;box-shadow:0 8px 25px rgba(0,0,0,0.4);transition:0.3s}
        .welcome button:hover{transform:scale(1.1) rotate(-2deg);background:#FFD400;color:#333}
        
        .container{max-width:1300px;margin:0 auto;padding:20px;position:relative;z-index:1}
        
        .hero{text-align:center;padding:60px 20px 40px}
        .hero .miss-img{width:280px;height:280px;border-radius:50%;border:8px solid #FFD400;box-shadow:0 0 0 8px #00B8D4, 0 15px 50px rgba(0,0,0,0.3);object-fit:cover;margin-bottom:25px;animation: float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .hero h2{font-size:42px;font-weight:900;color:#00B8D4;text-shadow:3px 3px 0 #FFD400;margin-bottom:10px}
        .hero p{font-size:20px;font-weight:700;color:#333;background:rgba(255,255,255,0.8);display:inline-block;padding:10px 25px;border-radius:50px}
        
        .videos{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:25px;margin:50px 0}
        .video-card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 8px 25px rgba(0,0,0,0.15);cursor:pointer;transition:0.4s;position:relative;border:3px solid transparent}
        .video-card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 15px 40px rgba(0,184,212,0.4);border:3px solid #FFD400}
        .video-thumb{position:relative;width:100%;padding-top:177%;background:linear-gradient(135deg, #00B8D4, #FFD400)}
        .video-thumb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
        .play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;background:rgba(255,212,0,0.95);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 20px rgba(0,0,0,0.3);transition:0.3s}
        .video-card:hover .play-icon{transform:translate(-50%,-50%) scale(1.2);background:#00B8D4}
        .play-icon:after{content:'';border-left:22px solid #333;border-top:14px solid transparent;border-bottom:14px solid transparent;margin-left:6px}
        .video-card:hover .play-icon:after{border-left-color:white}
        .video-title{background:#333;color:#FFD400;padding:12px;text-align:center;font-weight:700;font-size:16px}
        
        .contact{text-align:center;margin:60px 0}
        .contact a{background:linear-gradient(135deg, #00B8D4, #0081A7);color:white;padding:20px 50px;border-radius:50px;text-decoration:none;font-weight:900;font-size:22px;display:inline-block;box-shadow:0 8px 30px rgba(0,184,212,0.5);transition:0.3s;border:3px solid #FFD400}
        .contact a:hover{transform:scale(1.1) rotate(2deg);box-shadow:0 12px 40px rgba(0,184,212,0.7)}
        
        .footer{text-align:center;padding:40px 10px;font-size:13px;color:#666;font-weight:700}
        .footer span{color:#00B8D4}
        
        @media(max-width:768px){
            .welcome h1{font-size:24px;margin:0 20px 30px;padding:20px}
            .hero .miss-img{width:200px;height:200px}
            .hero h2{font-size:32px}
            .hero p{font-size:16px}
        }
    </style>
</head>
<body>
    <div class="welcome" id="welcome">
        <h1>مرحباً بيك في مملكة الميس خلود 👑<br>هنا هتتعلم إنجلش وانت مبتسم 💛</h1>
        <button onclick="enterSite()">ادخل المملكة 🔥</button>
    </div>

    <div class="container">
        <div class="hero">
            <!-- غير img1.jpg لصورة الميس خلود الشخصية -->
            <img src="img1.jpg" alt="الميس خلود" class="miss-img">
            <h2>Kholoud Vibes</h2>
            <p>معايا هتتكلم إنجلش من غير ما تحس ✨</p>
        </div>

        <div class="videos" id="videos"></div>

        <div class="contact">
            <a href="https://www.facebook.com/share/18hoxaWSV4/" target="_blank" onclick="playMeow()">💛 احجز مكانك مع الميس خلود دلوقتي</a>
        </div>
    </div>

    <div class="footer">
        تم التطوير بـ ❤️ بواسطة <span>بودا المصري</span> | 01122989039
    </div>

    <audio id="meow" src="meow.mp3"></audio>

    <script>
        const videos = [
            {link:"https://www.facebook.com/share/r/1LUVeJS65S/", title:"الدرس 1: أهم 10 جمل"},
            {link:"https://www.facebook.com/share/r/1DWWnbaVXX/", title:"الدرس 2: النطق الصح"},
            {link:"https://www.facebook.com/share/r/18YDNPT5TD/", title:"الدرس 3: المحادثة"},
            {link:"https://www.facebook.com/share/r/1DFZf9Uzsu/", title:"الدرس 4: الجرامر"},
            {link:"https://www.facebook.com/share/r/1CbngVHKwq/", title:"الدرس 5: الكلمات"},
            {link:"https://www.facebook.com/share/r/1BWc5cLTwS/", title:"الدرس 6: الاستماع"},
            {link:"https://www.facebook.com/share/r/1bDMHQ7AHG/", title:"الدرس 7: الأزمنة"},
            {link:"https://www.facebook.com/share/r/1CqP7HMvxK/", title:"الدرس 8: السؤال"},
            {link:"https://www.facebook.com/share/r/1EDWmxVbtG/", title:"الدرس 9: النفي"},
            {link:"https://www.facebook.com/share/r/18uKbDPPk7/", title:"الدرس 10: الصفات"},
            {link:"https://www.facebook.com/share/r/1B9hrN55Kx/", title:"الدرس 11: الأفعال"},
            {link:"https://www.facebook.com/share/r/19rmNprtgf/", title:"الدرس 12: الظروف"},
            {link:"https://www.facebook.com/share/r/1Gx9R8vACQ/", title:"الدرس 13: المقارنة"},
            {link:"https://www.facebook.com/share/r/1HAMZxCetx/", title:"الدرس 14: المبني للمجهول"},
            {link:"https://www.facebook.com/share/r/18TJKV7zuQ/", title:"الدرس 15: الشرط"},
            {link:"https://www.facebook.com/share/r/1B3hhDs1Q2/", title:"الدرس 16: الكلام المنقول"},
            {link:"https://www.facebook.com/share/r/18aZ8c2za9/", title:"الدرس 17: المراجعة"}
        ];

        const videosDiv = document.getElementById('videos');
        videos.forEach((vid, i) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-thumb">
                    <img src="https://via.placeholder.com/320x568/00B8D4/FFD400?text=الدرس+${i+1}" alt="درس">
                    <div class="play-icon"></div>
                </div>
                <div class="video-title">${vid.title}</div>`;
            card.onclick = () => { 
                playMeow(); 
                window.open(vid.link, '_blank');
            };
            videosDiv.appendChild(card);
        });

        function playMeow(){
            const audio = document.getElementById('meow');
            audio.currentTime = 0;
            audio.play().catch(e=>{});
        }

        function enterSite(){
            playMeow();
            document.getElementById('welcome').classList.add('hide');
        }

        document.addEventListener('click', () => playMeow());
    </script>
</body>
</html>
